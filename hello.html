<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-slate-50">
    <nav class="bg-white shadow-sm">
        <div class="flex items-center justify-between p-4 max-w-7xl mx-auto">
            <div class="flex items-center gap-2">
                <img class="w-8" src="./assets/github-logo.png" alt="">
                <p class="text-xl font-semibold text-gray-700">GitHub Issues Tracker</p>
            </div>
            <div>
                <!-- search div -->
                <div class="join">
                    <div>
                        <label class="input">
                            <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2" fill="none" stroke="currentColor">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <path d="m21 21-4.3-4.3"></path>
                                </g>
                            </svg>
                            <input id="input-search" type="text" placeholder="Search issues" required />
                        </label>
                       
                    </div>
                    <button id="btn-search" class="btn btn-primary join-item">Search</button>
                </div>
            </div>
        </div>
    </nav>
    <main class="max-w-6xl mx-auto">
        <section class="mt-10 flex gap-6 bg-white p-4 rounded-lg">
            <button onclick="selectStatus('all-btn')" id="all-btn" class="btn bg-[#422ad5] text-white">All</button>
            <button onclick="selectStatus('open-btn')" id="open-btn" class="btn bg-gray-100">Open</button>
            <button onclick="selectStatus('close-btn')" id="close-btn" class="btn bg-gray-100">Closed</button>
        </section>
        <section class="my-6 bg-white p-4 flex items-center justify-between rounded-lg">
            <div class="flex items-center gap-3">
                <img class="p-2 bg-violet-100 rounded-full" src="./assets/Aperture.png" alt="">
                <div>
                    <p class="text-xl font-semibold"><span id="tracker-length">0</span> Issues</p>
                    <p class="text-xs">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex items-center gap-8">
                <li class="marker:text-green-600">Open</li>
                <li class="marker:text-purple-600">Close</li>
            </div>
        </section>
        <!--  -->
        <section>
            <!-- Open the modal using ID.showModal() method -->
            <!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
           
        </section>
        <section>
             <dialog id="issue_modal" class="modal">
                <div class="modal-box">
                    <div>
                        <div class="flex justify-between items-center">
                            <h2 id="issue-title" class="text-xl font-semibold"></h2>
                            <button onclick="document.getElementById('issue_modal').close()" class="cursor-pointer "><i class="fa-solid fa-xmark"></i></button>
                        </div>
                        <div class="flex gap-6 text-xs items-center mt-4">
                            <p id="issue-status" class=""></p>
                            <ul class="flex gap-6">
                                <li class="list-disc">Opened by <span id="author-name"></span></li>
                                <li class="list-disc" id="created-date"></li>
                            </ul>
                        </div>
                        <div id="modal-issue-labels" class="mt-4 flex gap-2"></div>
                        <p class="text-sm text-gray-500 mt-3" id="issue-description"></p>
                        <div class="bg-slate-100 p-4 rounded-xl grid grid-cols-2 mt-5">
                            <div>
                                <p class="text-sm text-gray-600">Assignee:</p>
                                <p class="text-sm text-gray-800 font-medium" id="name"></p>
                            </div>
                            <div>
                                <p class="text-sm text-gray-600">Priority:</p>
                                <p class="" id="priority-value"></p>
                            </div>
                        </div>
                    </div>
                    <div class="modal-action">
                        <form method="dialog">
                            <!-- if there is a button in form, it will close the modal -->
                            <button class="btn btn-primary">Close</button>
                        </form>
                    </div>
                </div>
            </dialog>
        </section>


        <section id="all-issues"  class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 p-4">
        </section>
       

    </main>

    <script src="issue.js"></script>
</body>
</html>
