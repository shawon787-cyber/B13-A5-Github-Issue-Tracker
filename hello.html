<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50">
    <nav class="bg-white shadow-sm">
        <div class="flex items-center justify-between p-4 max-w-7xl mx-auto">
            <div class="flex items-center gap-2">
                <img class="w-8" src="./assets/github-logo.png" alt="">
                <p class="text-xl font-semibold text-gray-700">GitHub Issues Tracker</p>
            </div>
            <div>
                <div class="join">
                    <div>
                        <label class="input">
                            <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2" fill="none" stroke="currentColor">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <path d="m21 21-4.3-4.3"></path>
                                </g>
                            </svg>
                            <input type="text" placeholder="Search issues" required />
                        </label>
                        <div class="validator-hint hidden">Enter valid email address</div>
                    </div>
                    <button class="btn btn-primary join-item">Search</button>
                </div>
            </div>
        </div>
    </nav>
    <main class="max-w-6xl mx-auto">
        <section class="mt-10 flex gap-6 bg-white p-4 rounded-lg">
            <button class="btn bg-[#422ad5] text-white">All</button>
            <button class="btn bg-gray-100">Open</button>
            <button class="btn bg-gray-100">Closed</button>
        </section>
        <section class="my-6 bg-white p-4 flex items-center justify-between rounded-lg">
            <div class="flex items-center gap-3">
                <img class="p-2 bg-violet-100 rounded-full" src="./assets/Aperture.png" alt="">
                <div>
                    <p class="text-xl font-semibold"><span id="tracker-length">0</span> Issues</p>
                    <p class="text-xs">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex items-center gap-8">
                <li class="marker:text-green-600">Open</li>
                <li class="marker:text-purple-600">Close</li>
            </div>
        </section>
        <section id="all-issues">

        </section>
    </main>

    <script src="issue.js"></script>
</body>
</html>
